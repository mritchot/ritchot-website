summary: >-
  AI enablement and learning & development professional with 10+ years
  designing and delivering learning programs across four countries.
  Translates complex AI and emerging technology concepts into accessible,
  high-impact capability building initiatives for diverse professional
  audiences. Designed, developed, and independently deployed a four-module
  AI literacy enablement program grounded in 10 peer-reviewed studies,
  achieving 28% learner performance uplift through evidence-based
  instructional design and a Kirkpatrick Levels 1–4 evaluation framework.
  Combines instructional design expertise, hands-on generative AI fluency,
  and change management experience with a track record of driving
  technology adoption, building scalable learning solutions, and embedding
  AI tools into organizational workflows.

competencies:
  - AI Enablement & Adoption
