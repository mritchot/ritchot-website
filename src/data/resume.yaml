  - Cross-Functional Facilitation
  - E-Learning Design

featured:
  title: AI Literacy for the Modern Workforce
  links:
    - label: View the full program
      url: https://ai-literacy.ritchot.me/
    - label: View the source code
      url: https://github.com/mritchot/ai-literacy-platform
  bullets:
    - >-
      Conducted a structured needs analysis using action mapping and learner
      persona development, grounded in 10 peer-reviewed studies including
      Anthropic Economic Index workforce research and WEF Future of Jobs 2025
      data, to define capability gaps and performance objectives for a
      mid-career professional audience.
    - >-
      Designed a four-module, 37-section learning program with 12 practice
      activities, pre/post competency assessments, and adaptive sequencing —
      applying ADDIE methodology and Anthropic's 4D competency framework
      (Delegation, Description, Discernment, Diligence) as an organizing
      taxonomy.
    - >-
      Built a Kirkpatrick Levels 1–4 evaluation framework including reaction
      surveys, knowledge assessments with 28% pre-to-post performance uplift,
      behavioral transfer indicators, and organizational impact metrics.
    - >-
      Engineered and deployed a custom learning platform (React, TypeScript,
      Tailwind CSS) featuring client-side BPE tokenization, real
      softmax-with-temperature probability demonstrations, xAPI-aligned event
      tracking, active reading time analytics, and an admin dashboard with
      live learner data — deployed on Cloudflare Pages.
    - >-
      Delivered the complete program in approximately 210 hours solo across
      the full development cycle, a 3.5x compression (71% reduction in
      development time) against the Chapman Alliance industry baseline of
      ~735 hours for comparable Level-3 e-learning, demonstrating
      AI-augmented L&D development methodology.

